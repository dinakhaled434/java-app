name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  YOUR_NAME: "dina"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build the JAR
        run: mvn clean package -DskipTests

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-jar
          path: target/*.jar

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_DINAKHALEDD }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: dinakhaled123/java-app:${{ github.sha }}

      - name: Update CD Repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          sed -i "s|dinakhaled123/java-app:.*|dinakhaled123/java-app:${{ github.sha }}|g" dina/deployment.yaml
          git add dina/deployment.yaml
          git commit -m "Update image tag to ${{ github.sha }} [skip ci]"
          git push