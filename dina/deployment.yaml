apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-deployment
  namespace: dina
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-app
  template:
    metadata:
      labels:
        app: java-app
    spec:
      containers:
      - name: java-app
        image: dinakhaled123/java-app:de49a146023d9bf1fa85ea1c25dbab7533f817f8
        ports:
        - containerPort: 8090